name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # ─── macOS DMG ────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build fat JAR
        run: |
          chmod +x gradlew
          ./gradlew desktop:fatJar

      - name: Convert PNG icon to ICNS
        run: |
          ICON=core/src/main/resources/ikona.png
          mkdir -p icon.iconset
          sips -z 16   16   $ICON --out icon.iconset/icon_16x16.png
          sips -z 32   32   $ICON --out icon.iconset/icon_16x16@2x.png
          sips -z 32   32   $ICON --out icon.iconset/icon_32x32.png
          sips -z 64   64   $ICON --out icon.iconset/icon_32x32@2x.png
          sips -z 128  128  $ICON --out icon.iconset/icon_128x128.png
          sips -z 256  256  $ICON --out icon.iconset/icon_128x128@2x.png
          sips -z 256  256  $ICON --out icon.iconset/icon_256x256.png
          sips -z 512  512  $ICON --out icon.iconset/icon_256x256@2x.png
          sips -z 512  512  $ICON --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 $ICON --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o ikona.icns

      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package macOS DMG
        run: |
          jpackage \
            --input desktop/build/libs/ \
            --name "Iter Lucis" \
            --main-jar iter-lucis.jar \
            --main-class com.example.demogame.DesktopLauncher \
            --type dmg \
            --icon ikona.icns \
            --app-version ${{ steps.ver.outputs.VERSION || '1.0.0' }} \
            --dest dist/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: dist/*.dmg

  # ─── Windows EXE ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build fat JAR
        run: ./gradlew desktop:fatJar

      - name: Convert PNG icon to ICO
        run: magick core/src/main/resources/ikona.png -resize 256x256 ikona.ico

      - name: Get version
        id: ver
        shell: pwsh
        run: |
          $v = $env:GITHUB_REF_NAME -replace '^v', ''
          if (-not $v) { $v = '1.0.0' }
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Package Windows EXE
        run: |
          jpackage `
            --input desktop\build\libs\ `
            --name "Iter Lucis" `
            --main-jar iter-lucis.jar `
            --main-class com.example.demogame.DesktopLauncher `
            --type exe `
            --win-shortcut `
            --win-menu `
            --icon ikona.ico `
            --app-version ${{ steps.ver.outputs.VERSION }} `
            --dest dist\
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist\*.exe

  # ─── GitHub Release ───────────────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: dist/

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Pobieranie / Download

            | System | Plik |
            |--------|------|
            | 🪟 Windows | `Iter Lucis-*.exe` |
            | 🍎 macOS   | `Iter Lucis-*.dmg` |

            **Instalator zawiera Javę — nie trzeba nic instalować wcześniej.**